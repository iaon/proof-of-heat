<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Economics</title>
    <link rel="stylesheet" href="__ROOT_PATH__/static/css/app.css?v=__STATIC_VERSION__" />
    <link rel="stylesheet" href="__ROOT_PATH__/static/css/metrics.css?v=__STATIC_VERSION__" />
    <link rel="stylesheet" href="__ROOT_PATH__/static/css/economics.css?v=__STATIC_VERSION__" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Economics</h1>
    <p class="muted">Current market values and economics history for mining profitability.</p>

    <div class="card">
        <div class="row" style="margin-bottom:12px;">
            <strong>Current values</strong>
            <button id="refresh-current" type="button">Refresh</button>
        </div>
        <div id="economics-current" class="economics-grid"></div>
        <p id="economics-current-meta" class="muted"></p>
        <p id="economics-current-errors" class="muted"></p>
    </div>

    <div class="card">
        <div class="row preset-row">
            <label>Presets</label>
            <div class="preset-actions">
                <button type="button" class="preset-btn" data-preset="rates">Rates</button>
                <button type="button" class="preset-btn" data-preset="profitability">Profitability</button>
                <button type="button" class="preset-btn" data-preset="market">Market inputs</button>
            </div>
        </div>
        <div class="row" style="margin-bottom:12px;">
            <label for="metric-rows">Series</label>
            <div class="metric-rows" id="metric-rows"></div>
            <button id="add-metric" type="button" title="Add metric">+</button>
        </div>
        <div class="row">
            <label for="start-date">Start</label>
            <input id="start-date" type="date" />
            <input id="start-hour" type="number" min="0" max="23" placeholder="HH" />
            <input id="start-minute" type="number" min="0" max="59" placeholder="MM" />
            <input id="start-second" type="number" min="0" max="59" placeholder="SS" />
            <label for="end-date">End</label>
            <input id="end-date" type="date" />
            <input id="end-hour" type="number" min="0" max="23" placeholder="HH" />
            <input id="end-minute" type="number" min="0" max="59" placeholder="MM" />
            <input id="end-second" type="number" min="0" max="59" placeholder="SS" />
            <button id="reset-range" type="button">Last 24h</button>
            <button id="apply">Load</button>
        </div>
    </div>

    <div class="card">
        <canvas id="chart" height="120"></canvas>
        <p id="empty" class="muted"></p>
    </div>

    <script>
        const rootPath = __ROOT_PATH_JSON__;
    </script>
    <script src="__ROOT_PATH__/static/js/economics.js?v=__STATIC_VERSION__"></script>
</body>
</html>
