services:
  app:
    build:
      context: .
      args:
        PROOF_OF_HEAT_DISPLAY_VERSION: ${PROOF_OF_HEAT_DISPLAY_VERSION:-}
        PROOF_OF_HEAT_COMMIT: ${PROOF_OF_HEAT_COMMIT:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./conf:/app/conf
      - ./proof_of_heat:/app/proof_of_heat
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      # Example for reverse proxy prefix deployment:
      - ROOT_PATH=/poh
    command: ["python", "-m", "proof_of_heat.main"]
